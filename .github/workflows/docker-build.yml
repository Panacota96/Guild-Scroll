name: Docker Build & Push

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'docker/**'
      - 'src/**'
      - 'pyproject.toml'
      - 'docker-compose.yml'
      - 'k8s/**'
      - '.github/workflows/docker-build.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'docker/**'
      - 'src/**'
      - 'pyproject.toml'

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdown-links:
    name: Check Markdown Links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate local markdown links
        run: python scripts/check_markdown_links.py

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        image:
          - name: guild-scroll-app
            dockerfile: docker/Dockerfile.guild-scroll
            context: .
          - name: guild-scroll-kali
            dockerfile: docker/Dockerfile.kali
            context: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}

  scan:
    name: Scan Docker Images (Trivy)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    
    strategy:
      matrix:
        image:
          - guild-scroll-app
          - guild-scroll-kali

    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.ref_name == github.event.repository.default_branch && 'latest' || format('sha-{0}', github.sha) }}
          format: 'sarif'
          output: 'trivy-${{ matrix.image }}.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-${{ matrix.image }}.sarif'

  test-compose:
    name: Test Docker Compose
    runs-on: ubuntu-latest
    needs: build
    env:
      GUILD_SCROLL_APP_IMAGE: guild-scroll:test
      GUILD_SCROLL_RECORDER_IMAGE: guild-scroll-kali:test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start containers with Docker Compose
        run: docker compose up -d --build --timeout 60

      - name: Wait for services
        run: |
          echo "Waiting for Guild Scroll app to be healthy..."
          for i in {1..30}; do
            if docker compose exec -T guild-scroll-app curl -f http://localhost:8080/api/sessions; then
              echo "Guild Scroll app is healthy!"
              exit 0
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 2
          done
          echo "Guild Scroll app did not become healthy"
          docker compose logs
          exit 1

      - name: Test Kali container
        run: |
          echo "Testing Kali container..."
          docker compose exec -T kali-recorder echo "✓ Kali container is responsive"
          docker compose exec -T kali-recorder gscroll list

      - name: Verify session volume
        run: |
          docker compose exec -T guild-scroll-app ls -la /work/guild_scroll/sessions/ || true

      - name: Clean up
        if: always()
        run: docker compose down -v

  k8s-validate:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubeconform
        run: |
          curl -sSLo kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform.tar.gz
          mv kubeconform /usr/local/bin/

      - name: Validate Kubernetes manifests
        run: |
          for file in k8s/*.yaml; do
            # Skip kustomization.yaml — it's a Kustomize config, not a standard K8s resource
            if [[ "$file" == *"kustomization.yaml" ]]; then
              echo "Skipping $file (kustomize config)"
              continue
            fi
            echo "Validating $file..."
            kubeconform -strict "$file"
          done

      - name: Validate kustomization
        run: |
          echo "Checking if kubectl can process kustomization..."
          kubectl kustomize k8s/ > /tmp/kustomization-output.yaml
          echo "✓ Kustomization is valid"

  notify:
    name: Notify Completion
    runs-on: ubuntu-latest
    needs: [markdown-links, build, test-compose, k8s-validate]
    if: always()
    
    steps:
      - name: Check job statuses
        run: |
          echo "markdown-links: ${{ needs.markdown-links.result }}"
          echo "build:          ${{ needs.build.result }}"
          echo "test-compose:   ${{ needs.test-compose.result }}"
          echo "k8s-validate:   ${{ needs.k8s-validate.result }}"

          if [ "${{ needs.markdown-links.result }}" == "failure" ] || \
             [ "${{ needs.build.result }}" == "failure" ] || \
             [ "${{ needs.test-compose.result }}" == "failure" ] || \
             [ "${{ needs.k8s-validate.result }}" == "failure" ]; then
            echo "❌ Pipeline failed"
            exit 1
          else
            echo "✓ Markdown, Docker, and K8s checks passed"
          fi