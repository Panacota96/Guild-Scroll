name: Docker Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Trivy
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ${{ github.event.repository.url }}

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: codeql.sarif
